name: Validate Registry

on:
  pull_request:
    paths: ["tools/**", "scripts/**"]
  push:
    branches: [main]
    paths: ["tools/**", "scripts/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Validate YAMLs
        run: python .github/validate.py

  notify-sync:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger index rebuild
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.FIRELINUX_WEBHOOK_SECRET }}" \
            https://firelinux.com/api/v1/sync
        continue-on-error: true
